                    <p>奠基仪式上，公司总经理表示："新牧草基地的建设是公司产业链向上游延伸的重要一步，将有效降低养殖成本，提高产品质量。同时，基地将采用现代化种植技术，实现节水、节能、高效的可持续发展目标。"</p>
                    
                    <p>新牧草基地预计 2026 年 6 月建成投产，届时将创造 50 个就业岗位，带动周边农户增收致富。</p>
                `
            },
            '2': {
                title: '公司产品荣获绿色食品认证',
                date: '2026 年 3 月 10 日',
                category: '荣誉资质',
                content: `
                    <p>近日，新源县绿牧农牧业开发科技有限公司生产的乳制品、肉类产品顺利通过国家绿色食品发展中心认证，获得绿色食品标志使用权。这标志着公司产品质量和安全管理水平迈上新台阶。</p>
                    
                    <p>绿色食品认证是中国最高级别的食品质量认证之一，对生产环境、生产过程、产品质量都有严格要求。公司自 2025 年初启动认证工作，经过一年多的准备和改进，最终通过全部检测项目。</p>

                `
            },
            '3': {
                title: '与多家商超达成战略合作',
                date: '2026 年 2 月 28 日',
                category: '战略合作',

                content: `

        // 加载新闻内容
        function loadNews() {
            if (!newsId || !newsData[newsId]) {
                document.getElementById('news-title').textContent = '新闻不存在';
                document.getElementById('news-content').innerHTML = '<p>抱歉，您访问的新闻不存在或已被删除。</p>';
                return;
            }
            
            const news = newsData[newsId];
            document.getElementById('news-title').textContent = news.title;
            document.getElementById('news-date').textContent = news.date;
            document.getElementById('news-category').textContent = news.category;
            document.getElementById('news-content').innerHTML = news.content;
            
            // 更新页面标题
            document.title = news.title + ' - 绿牧农牧';
        }
        
        // 页面加载完成后执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadNews);
        } else {
            loadNews();
        }
